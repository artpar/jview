title: Canopy
description: "Native macOS A2UI Renderer — Describe a UI in text, get a native app"
url: "https://artpar.github.io"
baseurl: "/canopy"
remote_theme: just-the-docs/just-the-docs@v0.8.2

color_scheme: dark
search_enabled: true
search.heading_level: 3

heading_anchors: true
nav_enabled: true

aux_links:
  "GitHub": "https://github.com/artpar/canopy"
aux_links_new_tab: true

footer_content: "Canopy is MIT licensed. Native macOS apps from text prompts."

callouts:
  warning:
    title: Warning
    color: red
  note:
    title: Note
    color: blue
  tip:
    title: Tip
    color: green

plugins:
  - jekyll-seo-tag

exclude:
  - spec.md
  - handoff.md
  - plan.md
  - Gemfile.lock
  - "*.jsonl"
